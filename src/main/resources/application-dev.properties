spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/kitdb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:0000}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=${JWT_SECRET:dev-secret-key-dev-secret-key-dev-secret-key-123456}
jwt.access-expiration=900000

stt.base-url=${STT_SERVER_URL:http://localhost:8001}
ai.lecture.base-url=${STT_SERVER_URL:http://localhost:8001}

file.upload-dir=uploads

spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB